<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo da Sorte – Festa Junina</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{--azul:#1A3A8F;--azul-esc:#0D2460;--amarelo:#F5C800;--verm:#C0392B;--verde:#27AE60}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:var(--azul-esc);min-height:100vh;overflow-x:hidden}

  .flags-row{display:flex;flex-wrap:wrap;justify-content:center;background:var(--azul-esc);padding:8px 0 0}
  .flag{width:22px;height:30px;clip-path:polygon(0 0,100% 0,50% 100%);margin:0 2px;animation:bal 2.5s ease-in-out infinite;transform-origin:top center}
  .flag:nth-child(odd){animation-delay:.3s}.flag:nth-child(3n){animation-delay:.7s}
  @keyframes bal{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
  .fio{width:100%;height:4px;background:linear-gradient(90deg,transparent,#8B4513 10%,#8B4513 90%,transparent)}

  .header{background:linear-gradient(160deg,var(--azul-esc),var(--azul));padding:24px 20px 20px;text-align:center}
  .header h1{font-family:'Fredoka One',cursive;color:var(--amarelo);font-size:clamp(1.8rem,5vw,2.6rem);text-shadow:3px 3px 0 var(--azul-esc)}
  .header p{color:rgba(255,255,255,.75);font-size:.88rem;font-weight:700;margin-top:5px}

  .container{max-width:720px;margin:0 auto;padding:20px 16px 50px}

  .stats-row{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
  .stat{background:rgba(255,255,255,.08);border:2px solid;border-radius:14px;padding:10px 18px;text-align:center;min-width:95px}
  .stat.s1{border-color:var(--amarelo)}.stat.s2{border-color:#5DADE2}.stat.s3{border-color:var(--verde)}
  .stat-n{font-family:'Fredoka One',cursive;font-size:2rem;line-height:1}
  .stat.s1 .stat-n{color:var(--amarelo)}.stat.s2 .stat-n{color:#5DADE2}.stat.s3 .stat-n{color:var(--verde)}
  .stat-l{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.45);margin-top:3px}

  .ball-stage{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:20px}
  .ball{width:130px;height:130px;border-radius:50%;background:var(--amarelo);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:3.8rem;color:var(--azul-esc);border:5px solid rgba(255,255,255,.25);transition:transform .1s;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .ball.spin{animation:spin .07s linear infinite}
  .ball.pop{animation:pop .45s cubic-bezier(.36,.07,.19,.97)}
  @keyframes spin{0%{transform:scale(.96)}50%{transform:scale(1.04)}100%{transform:scale(.96)}}
  @keyframes pop{0%{transform:scale(.4);opacity:.2}60%{transform:scale(1.18)}80%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
  .ball-sub{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.55)}

  .controls{display:flex;align-items:center;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
  .btn-main{background:var(--verm);border:none;color:#fff;font-family:'Fredoka One',cursive;font-size:1.15rem;padding:13px 32px;border-radius:50px;cursor:pointer;box-shadow:0 6px 0 #922b21;transition:all .15s;letter-spacing:.3px}
  .btn-main:active{transform:translateY(3px);box-shadow:0 3px 0 #922b21}
  .btn-main:disabled{background:#444;box-shadow:0 6px 0 #222;cursor:not-allowed}
  .btn-main.pausado{background:#E67E22;box-shadow:0 6px 0 #b35b0a}
  .speed-wrap{display:flex;align-items:center;gap:8px}
  .speed-wrap label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.5)}
  .speed-sel{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;padding:6px 10px;border-radius:10px;outline:none;cursor:pointer}
  .speed-sel option{background:#1A3A8F}
  .btn-reset{background:transparent;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;padding:8px 16px;border-radius:10px;cursor:pointer;transition:all .2s}
  .btn-reset:hover{border-color:var(--verm);color:var(--verm)}

  .ultimos-wrap{margin-bottom:18px}
  .sec-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4);margin-bottom:10px;text-align:center}
  .ultimos{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;min-height:48px}
  .u-num{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.1rem;animation:fadeIn .35s ease}
  .u-num.recente{background:var(--amarelo);color:var(--azul-esc);border:2px solid rgba(255,255,255,.3);box-shadow:0 0 14px rgba(245,200,0,.4)}
  .u-num.antigo{background:var(--azul);color:#fff;border:2px solid rgba(255,255,255,.15)}
  @keyframes fadeIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

  .grade-wrap{background:rgba(0,0,0,.25);border-radius:16px;padding:14px;border:1px solid rgba(255,255,255,.08);margin-bottom:16px}
  .grade{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
  .cel{border-radius:7px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:clamp(.6rem,1.8vw,.9rem);color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);transition:all .3s}
  .cel.out{background:var(--azul);color:#fff;border-color:rgba(255,255,255,.2)}
  .cel.novo{background:var(--amarelo);color:var(--azul-esc);border-color:var(--amarelo);transform:scale(1.14);animation:celPop .4s ease}
  @keyframes celPop{0%{transform:scale(.6)}60%{transform:scale(1.22)}100%{transform:scale(1.14)}}

  .fim{background:var(--amarelo);border-radius:14px;padding:20px;text-align:center;display:none}
  .fim.show{display:block}
  .fim h2{font-family:'Fredoka One',cursive;color:var(--azul-esc);font-size:1.6rem}
  .fim p{color:var(--azul-esc);font-size:.85rem;font-weight:700;opacity:.75;margin-top:5px}

  .confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
  .cfp{position:absolute;top:-15px;border-radius:50%;animation:cair linear forwards}
  @keyframes cair{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div class="confetti-wrap" id="carea"></div>
<div class="flags-row" id="flags"></div>
<div class="fio"></div>

<div class="header">
  <h1>🎡 Bingo da Sorte</h1>
  <p>Festa Junina – Nilton Lins Japiim</p>
</div>

<div class="container">

  <div class="stats-row">
    <div class="stat s1"><div class="stat-n" id="sn-total">90</div><div class="stat-l">Total</div></div>
    <div class="stat s2"><div class="stat-n" id="sn-rest">90</div><div class="stat-l">Restantes</div></div>
    <div class="stat s3"><div class="stat-n" id="sn-sort">0</div><div class="stat-l">Sorteados</div></div>
  </div>

  <div class="ball-stage">
    <div class="ball" id="ball">?</div>
    <div class="ball-sub" id="ball-sub">Pressione iniciar</div>
  </div>

  <div class="controls">
    <button class="btn-main" id="btn-play">▶ Iniciar</button>
    <div class="speed-wrap">
      <label>Velocidade</label>
      <select class="speed-sel" id="speed-sel">
        <option value="4000">Lenta (4s)</option>
        <option value="2500" selected>Normal (2.5s)</option>
        <option value="1500">Rápida (1.5s)</option>
        <option value="800">Muito rápida (0.8s)</option>
      </select>
    </div>
    <button class="btn-reset" id="btn-reset">🔄 Reiniciar</button>
  </div>

  <div class="ultimos-wrap">
    <div class="sec-title">Últimos sorteados</div>
    <div class="ultimos" id="ultimos"></div>
  </div>

  <div class="grade-wrap">
    <div class="sec-title">Grade de números – 1 a 90</div>
    <div class="grade" id="grade"></div>
  </div>

  <div class="fim" id="fim">
    <h2>🎉 Todos os 90 números sorteados!</h2>
    <p>Clique em "Reiniciar" para começar um novo jogo.</p>
  </div>

</div>

<script>
const CORES_FLAG=['#C0392B','#F5C800','#1A3A8F','#27AE60','#E67E22','#8E44AD','#fff'];
const flagsEl=document.getElementById('flags');
for(let i=0;i<50;i++){
  const f=document.createElement('div');f.className='flag';
  f.style.background=CORES_FLAG[i%CORES_FLAG.length];
  flagsEl.appendChild(f);
}

const gradeEl=document.getElementById('grade');
const ultraEl=document.getElementById('ultimos');
const ballEl=document.getElementById('ball');
const ballSub=document.getElementById('ball-sub');
const btnPlay=document.getElementById('btn-play');
const btnReset=document.getElementById('btn-reset');
const speedSel=document.getElementById('speed-sel');
const fimEl=document.getElementById('fim');

let restantes=[],sorteados=[],cells={};
let timer=null,rodando=false,spinTimer=null;

function init(){
  clearInterval(timer);clearInterval(spinTimer);
  timer=null;spinTimer=null;rodando=false;
  restantes=[];sorteados=[];cells={};
  for(let i=1;i<=90;i++) restantes.push(i);
  gradeEl.innerHTML='';
  for(let i=1;i<=90;i++){
    const c=document.createElement('div');
    c.className='cel';c.textContent=i;c.id='c'+i;
    gradeEl.appendChild(c);cells[i]=c;
  }
  ultraEl.innerHTML='';
  ballEl.textContent='?';ballEl.className='ball';
  ballSub.textContent='Pressione iniciar';
  btnPlay.textContent='▶ Iniciar';btnPlay.className='btn-main';
  btnPlay.disabled=false;
  fimEl.classList.remove('show');
  updateStats();
}

function updateStats(){
  document.getElementById('sn-total').textContent=90;
  document.getElementById('sn-rest').textContent=restantes.length;
  document.getElementById('sn-sort').textContent=sorteados.length;
}

function sortearUm(){
  if(restantes.length===0){fim();return;}
  ballEl.className='ball spin';
  let ticks=0;
  spinTimer=setInterval(()=>{
    ticks++;
    ballEl.textContent=restantes[Math.floor(Math.random()*restantes.length)];
    if(ticks>=20){
      clearInterval(spinTimer);
      const idx=Math.floor(Math.random()*restantes.length);
      const num=restantes.splice(idx,1)[0];
      sorteados.unshift(num);
      ballEl.textContent=num;ballEl.className='ball pop';
      ballSub.textContent='Número '+num+' sorteado!';
      const c=cells[num];
      if(c){c.classList.add('novo');setTimeout(()=>c.classList.replace('novo','out'),500);}
      atualizarUltimos();updateStats();confetti();
      if(restantes.length===0){clearInterval(timer);timer=null;rodando=false;setTimeout(fim,600);}
    }
  },75);
}

function atualizarUltimos(){
  ultraEl.innerHTML='';
  sorteados.slice(0,8).forEach((n,i)=>{
    const el=document.createElement('div');
    el.className='u-num '+(i===0?'recente':'antigo');
    el.textContent=n;ultraEl.appendChild(el);
  });
}

function fim(){
  fimEl.classList.add('show');
  btnPlay.textContent='Finalizado';btnPlay.disabled=true;
  confetti(true);
}

function confetti(muito=false){
  const area=document.getElementById('carea');
  const cores=['#F5C800','#C0392B','#1A3A8F','#27AE60','#E67E22','#fff','#8E44AD'];
  for(let i=0;i<(muito?100:40);i++){
    const c=document.createElement('div');c.className='cfp';
    c.style.left=Math.random()*100+'vw';
    c.style.background=cores[Math.floor(Math.random()*cores.length)];
    const s=6+Math.random()*10;c.style.width=s+'px';c.style.height=s+'px';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    c.style.animationDuration=(1.2+Math.random()*2.5)+'s';
    c.style.animationDelay=(Math.random()*.8)+'s';
    area.appendChild(c);setTimeout(()=>c.remove(),4500);
  }
}

btnPlay.addEventListener('click',()=>{
  if(restantes.length===0) return;
  if(!rodando){
    rodando=true;
    btnPlay.textContent='⏸ Pausar';btnPlay.className='btn-main pausado';
    sortearUm();
    const getDelay=()=>parseInt(speedSel.value)||2500;
    timer=setInterval(()=>{if(restantes.length>0) sortearUm();},getDelay());
    speedSel.onchange=()=>{
      if(rodando&&timer){clearInterval(timer);timer=setInterval(()=>{if(restantes.length>0) sortearUm();},getDelay());}
    };
  } else {
    rodando=false;clearInterval(timer);timer=null;
    btnPlay.textContent='▶ Continuar';btnPlay.className='btn-main';
    ballSub.textContent='Pausado – clique para continuar';
  }
});

btnReset.addEventListener('click',init);
init();
</script>
</body>
</html>
